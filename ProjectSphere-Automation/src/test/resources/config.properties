# Environment
env=dev

# Application
# /home loads the marketing landing page first; BaseTest clicks the Sign In
# nav button to reach the actual login form (same Angular SPA route).
base.url=https://projectsphere-8xvr.onrender.com/home
browser=chrome

# Timeouts (seconds) - increased for Render free tier slow startup
implicit.wait=10
explicit.wait=60
page.load.wait=90

# Retry
retry.count=2

# Paths
report.path=target/reports/ExtentReport.html
screenshot.path=target/screenshots
excel.path=src/test/resources/testdata/ProjectSphere_TestDesign.xlsx

# Admin credentials
admin.email=admin@projectsphere.com
admin.password=Admin@123

# Project Manager credentials
pm.email=pm@projectsphere.com
pm.password=Pm@12345

# Developer credentials
developer.email=dev123@projectsphere.com
developer.password=Project@123
